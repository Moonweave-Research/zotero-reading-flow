<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reading Flow Settings</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h2 { margin-top: 0; color: #000; }
        .setting { 
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        label { 
            width: 180px;
            font-size: 14px;
        }
        input[type="color"] {
            border: none;
            width: 40px;
            height: 25px;
            cursor: pointer;
            background: none;
        }
        input[type="number"] {
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 80px;
        }
        .description {
            font-size: 12px;
            color: #666;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Reading Flow Settings</h2>
    
    <div class="setting">
        <label for="color-completed">Completed Color:</label>
        <input type="color" id="color-completed" value="#4caf50">
    </div>
    
    <div class="setting">
        <label for="color-reading">Reading Color:</label>
        <input type="color" id="color-reading" value="#2196f3">
    </div>
    
    <div class="setting">
        <label for="hover-debounce">Popover Delay (ms):</label>
        <input type="number" id="hover-debounce" value="400" min="100" max="2000">
    </div>

    <div class="description">
        Changes are saved automatically and applied after restart or tree refresh.
    </div>

    <script src="prefs.js"></script>
</body>
</html>
