<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Reading Flow: semantic-color progress ring sweeping over an open book -->
  <!-- Progress ring: to-read(gray) -> reading(blue) -> skimmed(purple) -> read(green) -->
  <g fill="none" stroke-width="5" stroke-linecap="round">
    <path d="M 11.27 36.73 A 18 18 0 0 1 7.37 17.11" stroke="#6b7280"/>
    <path d="M 7.37 17.11 A 18 18 0 0 1 24 6"        stroke="#2563eb"/>
    <path d="M 24 6 A 18 18 0 0 1 40.63 17.11"        stroke="#7c3aed"/>
    <path d="M 40.63 17.11 A 18 18 0 0 1 36.73 36.73" stroke="#16a34a"/>
  </g>
  <!-- 'read' end dot (green), marking flow completion -->
  <circle cx="36.73" cy="36.73" r="2.6" fill="#16a34a"/>

  <!-- Open book -->
  <g>
    <path d="M24 16.5 C 20.5 14.6, 15 14.4, 11.5 16.2 L 11.5 28.8 C 15 27, 20.5 27.2, 24 29.1 Z"
          fill="#ffffff" stroke="#334155" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M24 16.5 C 27.5 14.6, 33 14.4, 36.5 16.2 L 36.5 28.8 C 33 27, 27.5 27.2, 24 29.1 Z"
          fill="#ffffff" stroke="#334155" stroke-width="1.6" stroke-linejoin="round"/>
    <line x1="24" y1="16.5" x2="24" y2="29.1" stroke="#334155" stroke-width="1.6" stroke-linecap="round"/>
    <!-- page lines -->
    <g stroke="#94a3b8" stroke-width="1.1" stroke-linecap="round">
      <line x1="14.5" y1="19.3" x2="21" y2="20.0"/>
      <line x1="14.5" y1="22.3" x2="21" y2="23.0"/>
      <line x1="27" y1="20.0" x2="33.5" y2="19.3"/>
      <line x1="27" y1="23.0" x2="33.5" y2="22.3"/>
    </g>
  </g>
</svg>
